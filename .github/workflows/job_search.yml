name: Job Search Daily

on:
  push:
    branches: [ main ]
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  run-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostico de entorno
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== Verificando entorno ==="
          python -c "import os; k=os.environ.get('GROQ_API_KEY',''); print(f'GROQ_API_KEY presente: {bool(k)} (len={len(k)})')"
          python -c "import os; print('cv_profile.txt existe:', os.path.exists('cv_profile.txt'))"
          python -c "from groq import Groq; print('Libreria groq: OK')"

      - name: Run job search script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main.py

      - name: Save memory (seen_jobs.txt)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.txt
          # Intentar commit, si no hay cambios no hace nada
          git commit -m "chore: actualizar memoria de ofertas enviadas [skip ci]" || exit 0
          # Asegurar que estamos al día antes de pushear
          git pull --rebase origin main
          git push origin main

